<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Shifo Yordamchi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    /* Telegram theme params bilan JS orqali qayta yoziladi (fallback qiymatlar) */
    --tg-bg: #ffffff;
    --tg-text: #1a1a1a;
    --tg-hint: #999999;
    --tg-link: #2AABEE;
    --tg-button: #2AABEE;
    --tg-button-text: #ffffff;
    --tg-secondary-bg: #f4f5f7;

    /* Brend ranglar */
    --primary: #2AABEE;
    --primary-dark: #1c8fca;
    --secondary: #1a7a5e;
    --secondary-light: #22a37a;
    --danger: #e5534b;
    --card-bg: #ffffff;
    --card-shadow: 0 2px 10px rgba(20,30,45,.06);
    --radius-lg: 18px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --nav-height: 62px;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--tg-secondary-bg);
    color:var(--tg-text);
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}
  ::-webkit-scrollbar{display:none;}

  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    padding-bottom:calc(var(--nav-height) + 14px);
    position:relative;
  }

  /* ============ TOPBAR ============ */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:var(--tg-bg);
    padding:14px 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(0,0,0,.05);
  }
  .topbar h1{font-size:17px; margin:0; font-weight:700; letter-spacing:-.2px;}
  .topbar .sub{font-size:12px; color:var(--tg-hint); margin-top:1px;}
  .lang-pill{
    display:flex; gap:4px; background:var(--tg-secondary-bg);
    padding:4px; border-radius:20px;
  }
  .lang-pill button{
    border:none; background:transparent; padding:5px 9px; border-radius:16px;
    font-size:12px; font-weight:600; color:var(--tg-hint); cursor:pointer;
    transition:.15s;
  }
  .lang-pill button.active{background:var(--primary); color:#fff;}

  /* ============ PAGES ============ */
  .page{display:none; padding:16px; animation:fadeIn .25s ease;}
  .page.active{display:block;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  /* ============ HERO (Home) ============ */
  .hero{
    background:linear-gradient(135deg, var(--primary) 0%, var(--secondary) 130%);
    border-radius:var(--radius-lg);
    padding:22px 20px;
    color:#fff;
    position:relative;
    overflow:hidden;
    margin-bottom:18px;
  }
  .hero::after{
    content:"";
    position:absolute; right:-30px; top:-30px;
    width:140px; height:140px; border-radius:50%;
    background:rgba(255,255,255,.08);
  }
  .hero::before{
    content:"";
    position:absolute; right:30px; bottom:-40px;
    width:90px; height:90px; border-radius:50%;
    background:rgba(255,255,255,.07);
  }
  .hero .greet{font-size:19px; font-weight:700; margin:0 0 4px; position:relative;}
  .hero .greet-sub{font-size:13px; opacity:.9; margin:0; max-width:80%; position:relative; line-height:1.4;}
  .hero .icon{position:absolute; right:16px; top:16px; font-size:34px; opacity:.9;}

  .quick-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;
  }
  .quick-card{
    background:var(--card-bg); border-radius:var(--radius-md);
    padding:14px 12px; box-shadow:var(--card-shadow);
    border:1px solid rgba(0,0,0,.04);
    display:flex; flex-direction:column; gap:8px;
    cursor:pointer; transition:transform .12s;
  }
  .quick-card:active{transform:scale(.96);}
  .quick-card .qi{
    width:38px; height:38px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
  }
  .quick-card .qt{font-size:13.5px; font-weight:700;}
  .quick-card .qd{font-size:11px; color:var(--tg-hint); line-height:1.3;}

  .section-title{
    font-size:14px; font-weight:700; margin:22px 0 10px; display:flex;
    align-items:center; justify-content:space-between; color:var(--tg-text);
  }
  .section-title span.more{font-size:12px; font-weight:600; color:var(--primary); cursor:pointer;}

  .mini-doc-row{display:flex; gap:10px; overflow-x:auto; padding-bottom:4px;}
  .mini-doc{
    min-width:130px; background:var(--card-bg); border-radius:var(--radius-md);
    padding:12px; box-shadow:var(--card-shadow); border:1px solid rgba(0,0,0,.04);
    flex-shrink:0; cursor:pointer;
  }
  .mini-doc .av{
    width:42px; height:42px; border-radius:50%; background:var(--tg-secondary-bg);
    display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:8px;
    overflow:hidden;
  }
  .mini-doc .av img{width:100%; height:100%; object-fit:cover;}
  .mini-doc .n{font-size:12.5px; font-weight:700; line-height:1.25;}
  .mini-doc .s{font-size:11px; color:var(--tg-hint); margin-top:2px;}

  /* ============ DOCTORS PAGE ============ */
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--card-bg); border-radius:var(--radius-md);
    padding:11px 14px; box-shadow:var(--card-shadow); border:1px solid rgba(0,0,0,.04);
    margin-bottom:12px;
  }
  .search-box input{
    border:none; outline:none; background:transparent; flex:1;
    font-size:14px; color:var(--tg-text);
  }
  .search-box .si{color:var(--tg-hint); font-size:15px;}

  .chip-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px;}
  .chip{
    flex-shrink:0; padding:7px 14px; border-radius:20px; font-size:12.5px; font-weight:600;
    background:var(--card-bg); border:1px solid rgba(0,0,0,.08); color:var(--tg-text);
    cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .chip.active{background:var(--primary); border-color:var(--primary); color:#fff;}

  .doc-card{
    display:flex; gap:12px; background:var(--card-bg); border-radius:var(--radius-md);
    padding:13px; margin-bottom:10px; box-shadow:var(--card-shadow); border:1px solid rgba(0,0,0,.04);
    cursor:pointer; transition:transform .12s;
  }
  .doc-card:active{transform:scale(.98);}
  .doc-card .av{
    width:54px; height:54px; border-radius:14px; background:var(--tg-secondary-bg);
    display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; overflow:hidden;
  }
  .doc-card .av img{width:100%; height:100%; object-fit:cover;}
  .doc-card .info{flex:1; min-width:0;}
  .doc-card .name{font-size:14.5px; font-weight:700; margin:0 0 2px;}
  .doc-card .spec{
    display:inline-block; font-size:11px; font-weight:600; color:var(--secondary);
    background:rgba(26,122,94,.1); padding:2px 8px; border-radius:8px; margin-bottom:5px;
  }
  .doc-card .desc{font-size:12px; color:var(--tg-hint); line-height:1.35; overflow:hidden;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
  .doc-card .arrow{align-self:center; color:var(--tg-hint); font-size:18px;}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--tg-hint);
  }
  .empty-state .ei{font-size:38px; margin-bottom:10px;}
  .empty-state .et{font-size:14px; font-weight:600; color:var(--tg-text); margin-bottom:4px;}
  .empty-state .es{font-size:12.5px;}

  /* ============ CHAT PAGE ============ */
  .chat-wrap{display:flex; flex-direction:column; height:calc(100vh - 190px); min-height:340px;}
  .chat-log{flex:1; overflow-y:auto; padding:4px 2px 10px; display:flex; flex-direction:column; gap:10px;}
  .msg{max-width:82%; padding:10px 13px; border-radius:16px; font-size:13.5px; line-height:1.45; white-space:pre-wrap;}
  .msg.bot{
    align-self:flex-start; background:var(--card-bg); border:1px solid rgba(0,0,0,.05);
    border-bottom-left-radius:4px; box-shadow:var(--card-shadow);
  }
  .msg.user{
    align-self:flex-end; background:var(--primary); color:#fff; border-bottom-right-radius:4px;
  }
  .msg.typing{display:flex; gap:4px; align-items:center; padding:13px 15px;}
  .msg.typing span{width:6px; height:6px; border-radius:50%; background:var(--tg-hint); animation:blink 1.2s infinite;}
  .msg.typing span:nth-child(2){animation-delay:.2s;}
  .msg.typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;} 40%{opacity:1;}}

  .reco-box{
    background:var(--card-bg); border:1px solid rgba(0,0,0,.06); border-radius:var(--radius-md);
    padding:12px; margin-top:2px; box-shadow:var(--card-shadow);
  }
  .reco-box .rt{font-size:12px; font-weight:700; color:var(--secondary); margin-bottom:8px;}
  .reco-doc{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:8px 10px; border-radius:10px; background:var(--tg-secondary-bg); margin-bottom:6px; cursor:pointer;
  }
  .reco-doc .rn{font-size:12.5px; font-weight:600;}
  .reco-doc .rc{font-size:16px;}

  .chat-input-row{
    display:flex; gap:8px; padding:10px 2px 4px; align-items:flex-end;
    border-top:1px solid rgba(0,0,0,.06); background:var(--tg-secondary-bg);
  }
  .chat-input-row textarea{
    flex:1; border:1px solid rgba(0,0,0,.08); border-radius:18px; padding:10px 14px;
    font-size:13.5px; resize:none; max-height:90px; outline:none; background:var(--card-bg); color:var(--tg-text);
    font-family:inherit;
  }
  .send-btn{
    width:40px; height:40px; border-radius:50%; border:none; background:var(--primary); color:#fff;
    font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .send-btn:active{transform:scale(.92);}
  .send-btn:disabled{opacity:.5;}

  /* ============ STATS PAGE ============ */
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;}
  .stat-card{
    background:var(--card-bg); border-radius:var(--radius-md); padding:14px; box-shadow:var(--card-shadow);
    border:1px solid rgba(0,0,0,.04);
  }
  .stat-card .sv{font-size:24px; font-weight:800; color:var(--primary); line-height:1;}
  .stat-card .sl{font-size:11.5px; color:var(--tg-hint); margin-top:6px; font-weight:600;}

  .bar-row{margin-bottom:10px;}
  .bar-row .bl{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;}
  .bar-row .bl b{font-weight:700;}
  .bar-track{height:9px; border-radius:6px; background:var(--tg-secondary-bg); overflow:hidden;}
  .bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg, var(--primary), var(--secondary)); width:0%; transition:width .8s ease;}

  .locked{
    text-align:center; padding:60px 24px; color:var(--tg-hint);
  }
  .locked .li{font-size:42px; margin-bottom:12px;}

  /* ============ PROFILE PAGE ============ */
  .profile-card{
    background:linear-gradient(135deg, var(--secondary) 0%, var(--primary) 140%);
    border-radius:var(--radius-lg); padding:20px; color:#fff; margin-bottom:18px;
    display:flex; align-items:center; gap:14px;
  }
  .profile-card .av{
    width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,.2);
    display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; flex-shrink:0;
  }
  .profile-card .pn{font-size:16px; font-weight:700; margin:0 0 3px;}
  .profile-card .pm{font-size:12px; opacity:.9;}

  .field-group{margin-bottom:16px;}
  .field-label{font-size:12.5px; font-weight:700; color:var(--tg-hint); margin-bottom:7px; display:block;}
  .field-input{
    width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:1px solid rgba(0,0,0,.08);
    background:var(--card-bg); font-size:14px; color:var(--tg-text); outline:none;
  }
  .pill-row{display:flex; flex-wrap:wrap; gap:8px;}
  .pill{
    padding:8px 14px; border-radius:20px; font-size:12.5px; font-weight:600;
    background:var(--card-bg); border:1px solid rgba(0,0,0,.08); cursor:pointer; color:var(--tg-text);
  }
  .pill.active{background:var(--secondary); border-color:var(--secondary); color:#fff;}

  .save-btn{
    width:100%; padding:13px; border:none; border-radius:var(--radius-md); background:var(--primary);
    color:#fff; font-size:14.5px; font-weight:700; cursor:pointer; margin-top:6px;
  }
  .save-btn:active{transform:scale(.98);}

  /* ============ BOTTOM NAV ============ */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:var(--tg-bg); border-top:1px solid rgba(0,0,0,.06);
    display:flex; max-width:520px; margin:0 auto; height:var(--nav-height);
    padding-bottom:env(safe-area-inset-bottom);
    box-shadow:0 -2px 12px rgba(0,0,0,.04);
  }
  .nav-btn{
    flex:1; border:none; background:transparent; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px; color:var(--tg-hint); cursor:pointer;
  }
  .nav-btn .ni{font-size:20px; transition:transform .15s;}
  .nav-btn .nt{font-size:10px; font-weight:600;}
  .nav-btn.active{color:var(--primary);}
  .nav-btn.active .ni{transform:translateY(-2px);}

  /* ============ MODAL ============ */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100;
    display:none; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show{display:flex; animation:fadeIn .2s ease;}
  .modal-sheet{
    background:var(--tg-bg); width:100%; max-width:520px; border-radius:20px 20px 0 0;
    padding:20px; max-height:85vh; overflow-y:auto; animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-handle{width:36px; height:4px; border-radius:3px; background:rgba(0,0,0,.15); margin:0 auto 16px;}
  .modal-close{
    position:absolute; top:16px; right:16px; width:30px; height:30px; border-radius:50%;
    background:var(--tg-secondary-bg); border:none; font-size:15px; color:var(--tg-hint); cursor:pointer;
  }

  .doc-detail-head{display:flex; gap:14px; align-items:center; margin-bottom:16px;}
  .doc-detail-head .av{
    width:64px; height:64px; border-radius:16px; background:var(--tg-secondary-bg);
    display:flex; align-items:center; justify-content:center; font-size:26px; overflow:hidden; flex-shrink:0;
  }
  .doc-detail-head .av img{width:100%; height:100%; object-fit:cover;}
  .doc-detail-head h2{font-size:17px; margin:0 0 4px;}
  .call-btn{
    display:block; width:100%; text-align:center; padding:13px; border-radius:var(--radius-md);
    background:var(--secondary); color:#fff; text-decoration:none; font-weight:700; font-size:14px; margin-top:14px;
  }

  .toast{
    position:fixed; left:50%; bottom:calc(var(--nav-height) + 16px); transform:translateX(-50%) translateY(20px);
    background:#1a1a1a; color:#fff; padding:10px 18px; border-radius:22px; font-size:13px;
    z-index:200; opacity:0; transition:.25s; pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .loader{
    display:flex; align-items:center; justify-content:center; padding:40px;
    color:var(--tg-hint); font-size:13px; gap:8px;
  }
  .spin{width:16px; height:16px; border:2px solid var(--tg-hint); border-top-color:var(--primary);
    border-radius:50%; animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="app">

  <div class="topbar">
    <div>
      <h1 id="topbarTitle">Shifo Yordamchi</h1>
      <div class="sub" id="topbarSub">—</div>
    </div>
    <div class="lang-pill" id="langPill">
      <button data-lang="uz">UZ</button>
      <button data-lang="ru">RU</button>
      <button data-lang="en">EN</button>
    </div>
  </div>

  <!-- ============ HOME ============ -->
  <div class="page active" id="page-home">
    <div class="hero">
      <div class="icon">🩺</div>
      <p class="greet" id="homeGreet">Salom!</p>
      <p class="greet-sub" id="homeGreetSub">Sog'ligingiz haqida gapiring, biz yo'naltiramiz.</p>
    </div>

    <div class="quick-grid">
      <div class="quick-card" data-nav="chat">
        <div class="qi" style="background:rgba(42,171,238,.12); color:var(--primary);">🩺</div>
        <div class="qt" data-i18n="quick_ai">AI shifokor</div>
        <div class="qd" data-i18n="quick_ai_d">Simptom tahlili</div>
      </div>
      <div class="quick-card" data-nav="doctors">
        <div class="qi" style="background:rgba(26,122,94,.12); color:var(--secondary);">👨‍⚕️</div>
        <div class="qt" data-i18n="quick_doctors">Doktorlar</div>
        <div class="qd" data-i18n="quick_doctors_d">Mutaxassislar ro'yxati</div>
      </div>
      <div class="quick-card" data-nav="queue">
        <div class="qi" style="background:rgba(229,83,75,.12); color:var(--danger);">📞</div>
        <div class="qt" data-i18n="quick_queue">Bog'lanish</div>
        <div class="qd" data-i18n="quick_queue_d">Doktorga qo'ng'iroq</div>
      </div>
      <div class="quick-card" data-nav="stats">
        <div class="qi" style="background:rgba(153,153,153,.15); color:#666;">📊</div>
        <div class="qt" data-i18n="quick_stats">Statistika</div>
        <div class="qd" data-i18n="quick_stats_d">Admin panel</div>
      </div>
    </div>

    <div class="section-title">
      <span data-i18n="home_doctors_title">Mutaxassislarimiz</span>
      <span class="more" data-nav="doctors" data-i18n="see_all">Barchasi →</span>
    </div>
    <div class="mini-doc-row" id="homeDoctorsRow">
      <div class="loader"><div class="spin"></div></div>
    </div>
  </div>

  <!-- ============ DOCTORS ============ -->
  <div class="page" id="page-doctors">
    <div class="search-box">
      <span class="si">🔍</span>
      <input type="text" id="docSearch" data-i18n-ph="search_placeholder" placeholder="Ism yoki mutaxassislik...">
    </div>
    <div class="chip-row" id="specChips"></div>
    <div id="docList"><div class="loader"><div class="spin"></div></div></div>
  </div>

  <!-- ============ AI CHAT ============ -->
  <div class="page" id="page-chat">
    <div class="chat-wrap">
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-row">
        <textarea id="chatInput" rows="1" data-i18n-ph="chat_placeholder" placeholder="Xabar yozing..."></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <!-- ============ STATS ============ -->
  <div class="page" id="page-stats">
    <div id="statsWrap">
      <div class="loader"><div class="spin"></div></div>
    </div>
  </div>

  <!-- ============ PROFILE ============ -->
  <div class="page" id="page-profile">
    <div class="profile-card">
      <div class="av" id="profileAvatar">?</div>
      <div>
        <p class="pn" id="profileName">—</p>
        <p class="pm" id="profileMeta">—</p>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" data-i18n="profile_name">Ism</label>
      <input class="field-input" id="inputName" type="text">
    </div>

    <div class="field-group">
      <label class="field-label" data-i18n="profile_age">Yosh guruhi</label>
      <div class="pill-row" id="ageRow"></div>
    </div>

    <div class="field-group">
      <label class="field-label" data-i18n="profile_region">Viloyat</label>
      <div class="pill-row" id="regionRow"></div>
    </div>

    <div class="field-group">
      <label class="field-label" data-i18n="profile_lang">Til</label>
      <div class="pill-row" id="langRow">
        <div class="pill" data-lang="uz">🇺🇿 O'zbek</div>
        <div class="pill" data-lang="ru">🇷🇺 Русский</div>
        <div class="pill" data-lang="en">🇬🇧 English</div>
      </div>
    </div>

    <button class="save-btn" id="saveProfileBtn" data-i18n="profile_save">Saqlash</button>
  </div>

  <!-- ============ BOTTOM NAV ============ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-nav="home">
      <span class="ni">🏠</span><span class="nt" data-i18n="nav_home">Bosh sahifa</span>
    </button>
    <button class="nav-btn" data-nav="doctors">
      <span class="ni">👨‍⚕️</span><span class="nt" data-i18n="nav_doctors">Doktorlar</span>
    </button>
    <button class="nav-btn" data-nav="chat">
      <span class="ni">🩺</span><span class="nt" data-i18n="nav_chat">AI Chat</span>
    </button>
    <button class="nav-btn" data-nav="stats">
      <span class="ni">📊</span><span class="nt" data-i18n="nav_stats">Statistika</span>
    </button>

function tr(key, vars){
  let s = (I18N[state.lang] && I18N[state.lang][key]) || I18N.uz[key] || key;
  if (vars) Object.keys(vars).forEach(k => s = s.replace(`{${k}}`, vars[k]));

// ------------------------------------------------------------------
// 5) API YORDAMCHISI
// ------------------------------------------------------------------
async function api(path, options={}){
  const res = await fetch(CONFIG.API_BASE + path, {
    ...options,
    headers:{
      "Content-Type":"application/json",
      "X-Telegram-Init-Data": tg.initData || "",
      ...(options.headers || {})
    }
  });
  if (!res.ok){
    const t = await res.text().catch(()=> "");
    throw new Error(`API ${res.status}: ${t}`);
  }
  return res.json();
}

function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=> el.classList.remove("show"), 2200);
}

function showPage(name){
  // "queue" (bog'lanish) uchun alohida sahifa yo'q — hozircha doktorlar ro'yxatiga yo'naltiramiz
  if (name === "queue") name = "doctors";
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.nav === name));
  state.currentPage = name;
  updateChrome(name);

  if (name === "doctors" && state.doctors.length === 0) loadDoctors();
  if (name === "chat" && state.chatHistory.length === 0) initChat();
  if (name === "stats") loadStats();
  if (name === "profile") renderProfileForm();

  tg.HapticFeedback && tg.HapticFeedback.impactOccurred("light");
}

function updateChrome(name){
  const titleMap = { home:"Shifo Yordamchi", doctors: tr("nav_doctors"), chat: tr("nav_chat"), stats: tr("nav_stats"), profile: tr("nav_profile") };
  document.getElementById("topbarTitle").textContent = titleMap[name] || "Shifo Yordamchi";
  document.getElementById("topbarSub").textContent = tgUser.first_name ? ("👋 " + tgUser.first_name) : "";

  // BackButton: bosh sahifada emasmiz — orqaga tugmasi ko'rsatiladi
  try{
    if (name === "home"){ tg.BackButton.hide(); }
    else { tg.BackButton.show(); }
  }catch(e){}

  // MainButton har bir sahifa uchun
  try{
    tg.MainButton.offClick && tg.MainButton.offClick(mainButtonHandlers[state.currentPage]);
  }catch(e){}
  if (name === "profile"){
    tg.MainButton.setText(tr("profile_save"));
    tg.MainButton.show();
    tg.MainButton.onClick(mainButtonHandlers.profile);
  } else if (name === "chat"){
    tg.MainButton.setText(tr("chat_send"));
    tg.MainButton.show();
    tg.MainButton.onClick(mainButtonHandlers.chat);
  } else {
    tg.MainButton.hide();
  }
}

const mainButtonHandlers = {
  profile: () => saveProfile(),
  chat: () => sendChatMessage(),
};

try{
  tg.BackButton.onClick(() => {
    if (document.getElementById("modalOverlay").classList.contains("show")){ closeModal(); return; }
    showPage("home");
  });
}catch(e){}

document.querySelectorAll("[data-nav]").forEach(el=>{
  el.addEventListener("click", ()=> showPage(el.dataset.nav));
});

// Til almashtirish (topbar pill)

});
function setLang(lang){
  state.lang = lang;
  document.querySelectorAll("#langPill button").forEach(b=> b.classList.toggle("active", b.dataset.lang === lang));
  applyI18nStatic();
  updateChrome(state.currentPage);
  renderHome();
  if (state.currentPage === "doctors") renderDoctorList();
  if (state.currentPage === "profile") renderProfileForm();
  if (state.currentPage === "stats") loadStats();
  if (state.profile) saveProfile(true); // fon rejimida tilni saqlab qo'yamiz
}

function applyI18nStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = tr(el.dataset.i18n);

}

async function loadProfile(){
  try{
    const data = await api("/profile");
    if (data.registered){
      state.profile = data.profile;
      state.lang = data.profile.lang || state.lang;
      state.isAdmin = !!data.is_admin;
    } else {
      state.isAdmin = !!data.is_admin;
      openOnboarding();
    }
  }catch(e){
    console.error(e);
    // Backend hali sozlanmagan bo'lishi mumkin — demo rejimda davom etamiz
    showToast(tr("error_generic"));
  }
  document.querySelectorAll("#langPill button").forEach(b=> b.classList.toggle("active", b.dataset.lang === state.lang));
  applyI18nStatic();
  renderHome();
  updateChrome(state.currentPage);
}

function openOnboarding(){
  const ageOpts = AGE_KEYS.map(([k])=> `<div class="pill" data-age="${k}">${tr(k)}</div>`).join("");
  const regionOpts = REGION_KEYS.map(([raw,k])=> `<div class="pill" data-region="${raw}">${tr(k)}</div>`).join("");
  openModal(`
    <h2 style="margin:0 0 4px;font-size:17px;">${tr("onboarding_title")}</h2>
    <p style="margin:0 0 16px;font-size:12.5px;color:var(--tg-hint);">${tr("onboarding_sub")}</p>
    <div class="field-group">
      <label class="field-label">${tr("profile_name")}</label>
      <input class="field-input" id="obName" type="text" placeholder="${tr("onboarding_name_ph")}" value="${tgUser.first_name||""}">
    </div>
    <div class="field-group">
      <label class="field-label">${tr("profile_age")}</label>
      <div class="pill-row" id="obAge">${ageOpts}</div>
    </div>
    <div class="field-group">
      <label class="field-label">${tr("profile_region")}</label>
      <div class="pill-row" id="obRegion">${regionOpts}</div>
    </div>
    <button class="save-btn" id="obSubmit">${tr("onboarding_continue")}</button>
  `);
  let obAge = null, obRegion = null;
  document.getElementById("obAge").addEventListener("click", (e)=>{
    const p = e.target.closest(".pill"); if(!p) return;
    document.querySelectorAll("#obAge .pill").forEach(x=>x.classList.remove("active"));
    p.classList.add("active"); obAge = p.dataset.age;
  });
  document.getElementById("obRegion").addEventListener("click", (e)=>{
    const p = e.target.closest(".pill"); if(!p) return;
    document.querySelectorAll("#obRegion .pill").forEach(x=>x.classList.remove("active"));
    p.classList.add("active"); obRegion = p.dataset.region;
  });
  document.getElementById("obSubmit").addEventListener("click", async ()=>{
    const name = document.getElementById("obName").value.trim();
    if (name.length < 2 || !obAge || !obRegion){ showToast(tr("error_generic")); return; }
    try{
      const payload = { full_name:name, age_group:tr(obAge), region:obRegion, lang:state.lang };
      const data = await api("/profile", { method:"POST", body: JSON.stringify(payload) });
      state.profile = data.profile;
      closeModal();
      showToast(tr("profile_saved"));
      renderHome();
      renderProfileForm();
    }catch(e){ showToast(tr("error_generic")); }
  });
}

function renderProfileForm(){
  const p = state.profile;
  document.getElementById("profileAvatar").textContent = (p?.full_name || tgUser.first_name || "?").charAt(0).toUpperCase();
  document.getElementById("profileName").textContent = p?.full_name || tgUser.first_name || tr("profile_not_registered");
  document.getElementById("profileMeta").textContent = p ? `${p.age_group || ""} · ${p.region || ""}` : "@" + (tgUser.username || "—");
  document.getElementById("inputName").value = p?.full_name || tgUser.first_name || "";

  const ageRow = document.getElementById("ageRow");
  ageRow.innerHTML = AGE_KEYS.map(([k])=>
    `<div class="pill ${p && p.age_group===tr(k) ? "active":""}" data-age="${k}">${tr(k)}</div>`).join("");
  ageRow.onclick = (e)=>{
    const el = e.target.closest(".pill"); if(!el) return;
    ageRow.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
  };

  const regionRow = document.getElementById("regionRow");
  regionRow.innerHTML = REGION_KEYS.map(([raw,k])=>
    `<div class="pill ${p && p.region===raw ? "active":""}" data-region="${raw}">${tr(k)}</div>`).join("");
  regionRow.onclick = (e)=>{
    const el = e.target.closest(".pill"); if(!el) return;
    regionRow.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
  };

  document.querySelectorAll("#langRow .pill").forEach(el=>{
    el.classList.toggle("active", el.dataset.lang === state.lang);
  });
  document.getElementById("langRow").onclick = (e)=>{
    const el = e.target.closest(".pill"); if(!el) return;
    setLang(el.dataset.lang);
  };
}

async function saveProfile(silent){
  const name = document.getElementById("inputName").value.trim();
  const ageEl = document.querySelector("#ageRow .pill.active");
  const regionEl = document.querySelector("#regionRow .pill.active");
  if (!silent && (name.length < 2 || !ageEl || !regionEl)){
    showToast(tr("error_generic"));
    return;
  }
  try{
    const payload = {
      full_name: name || (state.profile && state.profile.full_name) || tgUser.first_name,
      age_group: ageEl ? tr(ageEl.dataset.age) : (state.profile && state.profile.age_group),
      region: regionEl ? regionEl.dataset.region : (state.profile && state.profile.region),
      lang: state.lang,
    };
    const data = await api("/profile", { method:"POST", body: JSON.stringify(payload) });
    state.profile = data.profile;
    if (!silent){ showToast(tr("profile_saved")); tg.HapticFeedback && tg.HapticFeedback.notificationOccurred("success"); }
    renderProfileForm();
    renderHome();
  }catch(e){ if(!silent) showToast(tr("error_generic")); }
}
document.getElementById("saveProfileBtn").addEventListener("click", ()=> saveProfile());

function renderHome(){
  const name = (state.profile && state.profile.full_name) || tgUser.first_name || "mehmon";
  document.getElementById("homeGreet").textContent = tr("home_greet", {name});
  document.getElementById("homeGreetSub").textContent = tr("home_greet_sub");
  document.querySelectorAll(".quick-card .qt").forEach(el=> el.textContent = tr(el.dataset.i18n));
  document.querySelectorAll(".quick-card .qd").forEach(el=> el.textContent = tr(el.dataset.i18n));
  document.querySelector('[data-nav="doctors"].more') && (document.querySelector('[data-nav="doctors"].more').textContent = tr("see_all"));
  document.querySelector(".section-title span:first-child").textContent = tr("home_doctors_title");

  if (state.doctors.length) renderHomeDoctorsRow();
  else loadDoctors(true);
}

function renderHomeDoctorsRow(){
  const row = document.getElementById("homeDoctorsRow");
  const list = state.doctors.slice(0, 8);
  if (!list.length){ row.innerHTML = `<div class="empty-state" style="padding:20px;"><div class="es">${tr("no_results")}</div></div>`; return; }
  row.innerHTML = list.map(d => `
    <div class="mini-doc" data-doc="${d.id}">
      <div class="av">${d.photo_url ? `<img src="${d.photo_url}">` : "👨‍⚕️"}</div>
      <div class="n">${escapeHtml(d.name)}</div>
      <div class="s">${escapeHtml(d.specialty)}</div>
    </div>`).join("");
  row.querySelectorAll("[data-doc]").forEach(el=> el.addEventListener("click", ()=> openDoctorDetail(el.dataset.doc)));
}

// ------------------------------------------------------------------
// 10) DOKTORLAR
// ------------------------------------------------------------------
async function loadDoctors(silentForHome){
  try{
    const data = await api("/doctors");
    state.doctors = data.doctors || [];
    state.specialties = [...new Set(state.doctors.map(d=> d.specialty))];
    renderSpecChips();
    renderDoctorList();
    if (silentForHome) renderHomeDoctorsRow();
  }catch(e){
    document.getElementById("docList").innerHTML = emptyStateHtml();
    if (!silentForHome) showToast(tr("error_generic"));
  }
}

function renderSpecChips(){
  const wrap = document.getElementById("specChips");
  const chips = [`<div class="chip active" data-spec="">${tr("filter_all")}</div>`]
    .concat(state.specialties.map(s => `<div class="chip" data-spec="${escapeHtml(s)}">${escapeHtml(s)}</div>`));
  wrap.innerHTML = chips.join("");
  wrap.querySelectorAll(".chip").forEach(el=>{
    el.addEventListener("click", ()=>{
      wrap.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      el.classList.add("active");
      state.activeSpec = el.dataset.spec || null;
      renderDoctorList();
    });
  });
}

document.getElementById("docSearch").addEventListener("input", ()=> renderDoctorList());

function renderDoctorList(){
  const q = document.getElementById("docSearch").value.trim().toLowerCase();
  let list = state.doctors;
  if (state.activeSpec) list = list.filter(d => d.specialty === state.activeSpec);
  if (q) list = list.filter(d => d.name.toLowerCase().includes(q) || d.specialty.toLowerCase().includes(q));

  const el = document.getElementById("docList");
  if (!list.length){ el.innerHTML = emptyStateHtml(); return; }
  el.innerHTML = list.map(d => `
    <div class="doc-card" data-doc="${d.id}">
      <div class="av">${d.photo_url ? `<img src="${d.photo_url}">` : "👨‍⚕️"}</div>
      <div class="info">
        <p class="name">${escapeHtml(d.name)}</p>
        <span class="spec">${escapeHtml(d.specialty)}</span>
        <p class="desc">${escapeHtml(d.description || "")}</p>
      </div>
      <div class="arrow">›</div>
    </div>`).join("");
  el.querySelectorAll("[data-doc]").forEach(x=> x.addEventListener("click", ()=> openDoctorDetail(x.dataset.doc)));
}

function emptyStateHtml(){
  return `<div class="empty-state"><div class="ei">🔍</div><div class="et">${tr("doctors_empty_t")}</div><div class="es">${tr("doctors_empty_s")}</div></div>`;
}

function openDoctorDetail(id){
  const d = state.doctors.find(x => String(x.id) === String(id));
  if (!d) return;
  openModal(`
    <div class="doc-detail-head">
      <div class="av">${d.photo_url ? `<img src="${d.photo_url}">` : "👨‍⚕️"}</div>
      <div>
        <h2>${escapeHtml(d.name)}</h2>
        <span class="spec">${escapeHtml(d.specialty)}</span>
      </div>
    </div>
    <p style="font-size:13.5px;line-height:1.5;color:var(--tg-text);">${escapeHtml(d.description || "")}</p>
    <a class="call-btn" href="tel:${d.phone}">${tr("call_btn")} · ${escapeHtml(d.phone)}</a>
  `);
  tg.HapticFeedback && tg.HapticFeedback.impactOccurred("medium");
}

// ------------------------------------------------------------------
// 11) AI CHAT
// ------------------------------------------------------------------
function initChat(){
  state.chatHistory = [];
  const log = document.getElementById("chatLog");
  log.innerHTML = "";
  appendMsg("bot", tr("chat_welcome"));
}

function appendMsg(role, text){
  const log = document.getElementById("chatLog");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function appendRecommendation(specialty, doctors){
  const log = document.getElementById("chatLog");
  const box = document.createElement("div");
  box.className = "reco-box";
  const docsHtml = doctors.length
    ? doctors.map(d => `<div class="reco-doc" data-doc="${d.id}"><span class="rn">${escapeHtml(d.name)}</span><span class="rc">›</span></div>`).join("")
    : `<div style="font-size:12px;color:var(--tg-hint);">${tr("no_results")}</div>`;
  box.innerHTML = `<div class="rt">✅ ${tr("recommend_label")}: ${escapeHtml(specialty)}</div>${docsHtml}`;
  log.appendChild(box);
  log.scrollTop = log.scrollHeight;
  box.querySelectorAll("[data-doc]").forEach(el=> el.addEventListener("click", ()=> openDoctorDetail(el.dataset.doc)));
}

async function sendChatMessage(){
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  appendMsg("user", text);
  state.chatHistory.push({ role:"user", content:text });

  const log = document.getElementById("chatLog");
  const typingEl = document.createElement("div");
  typingEl.className = "msg bot typing";
  typingEl.innerHTML = "<span></span><span></span><span></span>";
  log.appendChild(typingEl);
  log.scrollTop = log.scrollHeight;

  document.getElementById("sendBtn").disabled = true;
  try{
    const data = await api("/chat", { method:"POST", body: JSON.stringify({ history: state.chatHistory, lang: state.lang }) });
    typingEl.remove();
    appendMsg("bot", data.reply);
    state.chatHistory.push({ role:"assistant", content: data.reply_raw || data.reply });
    if (data.specialty){
      appendRecommendation(data.specialty, data.doctors || []);
    }
  }catch(e){
    typingEl.remove();
    appendMsg("bot", tr("error_generic"));
  }
  document.getElementById("sendBtn").disabled = false;
}
document.getElementById("sendBtn").addEventListener("click", sendChatMessage);
document.getElementById("chatInput").addEventListener("keydown", (e)=>{
  if (e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendChatMessage(); }
});
document.getElementById("chatInput").addEventListener("input", function(){
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 90) + "px";
});

// ------------------------------------------------------------------
// 12) STATISTIKA (faqat admin)
// ------------------------------------------------------------------
async function loadStats(){
  const wrap = document.getElementById("statsWrap");
  if (!state.isAdmin){
    wrap.innerHTML = `<div class="locked"><div class="li">🔒</div><div class="et" style="margin-bottom:6px;">${tr("stats_locked_t")}</div><div class="es">${tr("stats_locked_s")}</div></div>`;
    return;
  }
  wrap.innerHTML = `<div class="loader"><div class="spin"></div></div>`;
  try{
    const s = await api("/stats");
    renderStats(s);
  }catch(e){
    wrap.innerHTML = `<div class="empty-state"><div class="ei">⚠️</div><div class="et">${tr("error_generic")}</div></div>`;
  }
}

function renderStats(s){
  const wrap = document.getElementById("statsWrap");
  const maxSpec = Math.max(1, ...(s.top_specialties||[]).map(x=>x.count));
  const maxRegion = Math.max(1, ...(s.region_stats||[]).map(x=>x.count));
  const maxDaily = Math.max(1, ...(s.daily_stats||[]).map(x=>x.count));

  wrap.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="sv" data-count="${s.total_users||0}">0</div><div class="sl">${tr("stats_total_users")}</div></div>
      <div class="stat-card"><div class="sv" data-count="${s.registered||0}">0</div><div class="sl">${tr("stats_registered")}</div></div>
      <div class="stat-card"><div class="sv" data-count="${s.week_queries||0}">0</div><div class="sl">${tr("stats_week_queries")}</div></div>
      <div class="stat-card"><div class="sv" data-count="${s.total_queries||0}">0</div><div class="sl">${tr("stats_total_queries")}</div></div>
    </div>

    <div class="section-title"><span>${tr("stats_top_specialties")}</span></div>
    ${(s.top_specialties||[]).map(x=>`
      <div class="bar-row">
        <div class="bl"><span>${escapeHtml(x.specialty)}</span><b>${x.count}</b></div>
        <div class="bar-track"><div class="bar-fill" data-w="${(x.count/maxSpec*100).toFixed(0)}"></div></div>
      </div>`).join("") || `<div class="empty-state"><div class="es">${tr("no_results")}</div></div>`}

    <div class="section-title"><span>${tr("stats_top_regions")}</span></div>
    ${(s.region_stats||[]).map(x=>`
      <div class="bar-row">
        <div class="bl"><span>${escapeHtml(x.region)}</span><b>${x.count}</b></div>
        <div class="bar-track"><div class="bar-fill" data-w="${(x.count/maxRegion*100).toFixed(0)}"></div></div>
      </div>`).join("") || `<div class="empty-state"><div class="es">${tr("no_results")}</div></div>`}

    <div class="section-title"><span>${tr("stats_daily")}</span></div>
    ${(s.daily_stats||[]).map(x=>`
      <div class="bar-row">
        <div class="bl"><span>${x.day}</span><b>${x.count}</b></div>
        <div class="bar-track"><div class="bar-fill" data-w="${(x.count/maxDaily*100).toFixed(0)}"></div></div>
      </div>`).join("") || `<div class="empty-state"><div class="es">${tr("no_results")}</div></div>`}
  `;

  // Animatsiya: raqamlar va barlar
  requestAnimationFrame(()=>{
    wrap.querySelectorAll(".bar-fill").forEach(el=> el.style.width = el.dataset.w + "%");
    wrap.querySelectorAll(".sv[data-count]").forEach(el=>{
      const target = parseInt(el.dataset.count, 10) || 0;
      let cur = 0;
      const step = Math.max(1, Math.ceil(target/30));
      const t = setInterval(()=>{
        cur = Math.min(target, cur+step);
        el.textContent = cur;
        if (cur>=target) clearInterval(t);
      }, 20);
    });
  });
}

// ------------------------------------------------------------------
// 13) YORDAMCHI FUNKSIYALAR
// ------------------------------------------------------------------
function escapeHtml(str){
  return String(str||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

(async function bootstrap(){
  applyI18nStatic();
  await loadProfile();
  showPage("home");
  loadDoctors(true);
})();
